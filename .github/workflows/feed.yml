name: Update feed

on:
  schedule:
    # Twice a day (06:17 and 18:17 UTC). Odd minute avoids the congested
    # top-of-hour slot where GitHub delays/drops scheduled runs.
    - cron: "17 6,18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: feed-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          # Set this to your real Pages URL once, in repo Settings →
          # Secrets and variables → Actions → Variables → FEED_SELF_URL.
          FEED_SELF_URL: ${{ vars.FEED_SELF_URL }}
        run: python scraper.py

      - name: Commit and push if changed
        run: |
          git config user.name "feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json docs/feed.xml
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update feed $(date -u +%F)"
            git push
          fi
